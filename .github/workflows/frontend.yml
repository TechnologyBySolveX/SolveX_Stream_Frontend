name: Build & Deploy React Frontend

on:
  push:
    branches:
      - main

jobs:
# =======================
# CI JOB: BUILD & PUSH
# =======================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push React Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sunilya96/react-frontend:latest
          
# =======================
# CD JOB: DEPLOY ON EC2
# =======================
  deploy:
    needs: build
    runs-on: [self-hosted, linux, x64, frontend, aws_ec2]

    steps:
      - name: Pull image from Docker Hub
        run: docker pull sunilya96/react-frontend:latest

      - name: Remove dangling images
        run: docker image prune -f

      - name: Stop and remove old container if exists
        run: |
          docker stop react-frontend || true
          docker rm react-frontend || true

      - name: Run new container
        run: |
          docker run -d \
            --name react-frontend \
            -p 80:80 \
            --restart unless-stopped \
            sunilya96/react-frontend:latest
