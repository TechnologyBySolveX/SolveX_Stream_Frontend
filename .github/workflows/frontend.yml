# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Build & Deploy React Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push React Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sunilya96/react-frontend:latest
deploy:
    needs: build
    runs-on: [self-hosted, linux, x64, ec2]

    steps:

      - name: Pull image from Docker Hub
        run: docker pull sunilya96/react-frontend:latest

      - name: Remove all <none> images
        run: docker image prune -f

      - name: Stop & remove old container if exists
        run: |
          docker ps -a --format '{{.Names}}' | grep -w react-frontend >/dev/null 2>&1 && \
            docker stop react-frontend || true
          docker ps -a --format '{{.Names}}' | grep -w react-frontend >/dev/null 2>&1 && \
            docker rm react-frontend || true

      
      - name: Run new container
        run: |
          docker run -d \
          --name react-frontend \
          -p 80:80 \
          --restart unless-stopped \
          react-frontend
          sunilya96/react-frontend:latest
